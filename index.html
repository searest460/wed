    <style>
      /* Base optimizations */
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #fdfbf7;
        overflow-x: hidden;
      }

      body {
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        width: 100%;
      }

      body.loaded {
        opacity: 1;
      }

      /* Remove the white spotlight glow and language switcher */
      div[class*="blur-"][class*="xl"], 
      div[class*="blur-"][class*="2xl"], 
      div[class*="blur-"][class*="3xl"] {
        display: none !important;
      }

      /* Hide top-right fixed/absolute elements (language switcher location) */
      .fixed.top-4.right-4, 
      .absolute.top-4.right-4,
      .fixed.top-5.right-5,
      .absolute.top-5.right-5,
      [class*="LanguageProvider"],
      [class*="language-switcher"],
      [class*="floating-widget"],
      .fixed.top-1\/2.right-4,
      .absolute.top-1\/2.right-4,
      .fixed.top-1\/2.-translate-y-1\/2.right-5,
      [class*="fixed"][class*="right-"],
      [style*="z-index: 9999"],
      [style*="z-index: 2147483647"] {
        display: none !important;
      }

      /* Hero Video Background */
      #hero-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        object-fit: cover;
        filter: brightness(0.8) saturate(1.1);
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
        pointer-events: none;
      }

      #hero-video.visible {
        opacity: 1;
      }

      /* Section transparency for Hero */
      .hero-active {
        background-color: transparent !important;
        position: relative;
        z-index: 1;
        overflow: hidden;
      }

      /* Premium Section Entry Animations */
      .reveal-on-scroll {
        opacity: 0;
        transform: translateY(15px); /* Reduced distance for subtler feel */
        transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: transform, opacity;
      }

      .reveal-on-scroll.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Fix for squashed images and layout issues */
      img {
        max-width: 100%;
        height: auto;
        object-fit: contain;
      }

      /* Ensure images intended to cover sections do so correctly */
      [class*="h-screen"] img, 
      [class*="h-["] img,
      [class*="min-h-screen"] img {
        object-fit: cover;
      }

      /* Fix for layout gaps without forcing flex on root */
      #root {
        width: 100%;
        position: relative;
      }

      section, [class*="min-h-screen"] {
        width: 100%;
        position: relative;
        box-sizing: border-box;
      }
    </style>
    <script>
      // Force hide any persistent elements that might be the question mark
      const hideElements = () => {
        const selectors = [
          '[class*="LanguageProvider"]',
          '[class*="language-switcher"]',
          '[class*="floating-widget"]',
          '.fixed.top-1\\/2.right-4',
          '.absolute.top-1\\/2.right-4',
          '[style*="z-index: 9999"]',
          '[style*="z-index: 2147483647"]',
          'iframe[src*="google.com"]'
        ];
        selectors.forEach(s => {
          document.querySelectorAll(s).forEach(el => {
            el.style.setProperty('display', 'none', 'important');
          });
        });
      };

      document.addEventListener('DOMContentLoaded', () => {
        hideElements();
        // Fade in body
        setTimeout(() => document.body.classList.add('loaded'), 50);

        const video = document.getElementById('hero-video');
        
        // Optimize video placement
        const moveVideo = () => {
          // Look for the first section that is likely the hero
          const sections = document.querySelectorAll('#root section, #root [class*="min-h-screen"]');
          if (sections.length > 0) {
            const hero = sections[0];
            if (video && !hero.contains(video)) {
              hero.classList.add('hero-active');
              hero.style.position = 'relative';
              hero.insertBefore(video, hero.firstChild);
              video.style.display = 'block';
              setTimeout(() => {
                video.classList.add('visible');
                video.play().catch(() => {});
              }, 100);
            }
          }
        };

        // MutationObserver for React mount
        const observer = new MutationObserver((mutations) => {
          hideElements();
          moveVideo();
          
          // Add reveal classes to sections (skipping hero)
          const sections = document.querySelectorAll('#root section, #root > div > div:not([class*="fixed"])');
          sections.forEach((section, index) => {
            if (index === 0) return; // Skip hero
            if (!section.classList.contains('reveal-on-scroll') && !section.contains(video)) {
              // Ensure children are properly sized
              section.style.width = '100%';
              section.classList.add('reveal-on-scroll');
              revealObserver.observe(section);
            }
          });
        });

        // IntersectionObserver for scroll animations
        const revealObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
              revealObserver.unobserve(entry.target); // Only animate once
            }
          });
        }, { threshold: 0.05, rootMargin: '0px 0px -50px 0px' });

        observer.observe(document.body, { childList: true, subtree: true });
        window.addEventListener('load', moveVideo);
      });
    </script>
    <script type="module" crossorigin src="/assets/index-CvER8GyV.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-swSRspiq.css">
  </head>

  <body>
    <video autoplay muted loop playsinline id="hero-video" style="display: none;">
      <source src="/assets/hero-video-BkP1eoiB.mp4" type="video/mp4">
    </video>
    <div id="root"></div>
  </body>
</html>
