<!doctype html>
<html lang="en" class="light" translate="no" style="color-scheme: light only">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      /* Base optimizations */
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #fdfbf7;
        overflow-x: hidden;
      }

      body {
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        width: 100%;
      }

      body.loaded {
        opacity: 1 !important;
        visibility: visible !important;
      }

      /* Remove the white spotlight glow and language switcher */
      div[class*="blur-"][class*="xl"], 
      div[class*="blur-"][class*="2xl"], 
      div[class*="blur-"][class*="3xl"] {
        display: none !important;
      }

      /* Hide top-right fixed/absolute elements (language switcher location) */
      .fixed.top-4.right-4, 
      .absolute.top-4.right-4,
      .fixed.top-5.right-5,
      .absolute.top-5.right-5,
      [class*="LanguageProvider"],
      [class*="language-switcher"],
      [class*="floating-widget"],
      .fixed.top-1\/2.right-4,
      .absolute.top-1\/2.right-4,
      .fixed.top-1\/2.-translate-y-1\/2.right-5,
      [class*="fixed"][class*="right-"],
      [style*="z-index: 9999"],
      [style*="z-index: 2147483647"],
      [style*="position: fixed"][style*="right:"],
      [style*="position: absolute"][style*="right:"],
      /* Aggressive iOS question mark fix (Ultra) */
      img[src=""], 
      img:not([src]), 
      img[src$="undefined"],
      img[src$="null"],
      img[src*="placeholder"],
      .tp-caption img,
      .tp-caption,
      [class*="rev_slider"],
      [class*="tp-banner"],
      [class*="tp-bgimg"],
      [class*="tp-loader"],
      [class*="revslider"],
      [id*="rev_slider"],
      [id*="revslider"],
      /* Hide any champagne tower related items */
      img[src*="champagne"],
      [style*="champagne"],
      /* Hide specific mansion and bow portion */
      img[src*="venue-hedsor-front"],
      img[src*="bow-illustration"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        width: 0 !important;
        height: 0 !important;
        pointer-events: none !important;
        position: absolute !important;
        left: -9999px !important;
      }

      /* Global hide for any element that might be the blue question mark */
      i.fa-question, 
      i.lucide-help-circle,
      .lucide-help-circle,
      .question-mark,
      .help-icon {
        display: none !important;
      }

      /* Hero Video Background */
      #hero-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        object-fit: cover;
        filter: brightness(0.8) saturate(1.1);
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
        pointer-events: none;
      }

      #hero-video.visible {
        opacity: 1;
      }

      /* Section transparency for Hero */
      .hero-active {
        background-color: transparent !important;
        position: relative;
        z-index: 1;
        overflow: hidden;
      }

      /* Premium Section Entry Animations */
      .reveal-on-scroll {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        will-change: transform, opacity;
      }

      .reveal-on-scroll.active {
        opacity: 1 !important;
        transform: translateY(0) !important;
      }

      /* Responsive Countdown Styles */
      .countdown-wrapper {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
        gap: 0.5rem;
        width: 100%;
        max-width: 100vw;
        padding: 0 1rem;
      }

      .countdown-unit {
        flex: 1 1 auto;
        min-width: 60px;
        max-width: 120px;
      }

      @media (max-width: 640px) {
        .countdown-val {
          font-size: 2.5rem !important;
        }
        .countdown-unit {
          min-width: 50px;
        }
        .countdown-sep {
          display: none !important;
        }
      }

      @media (min-width: 641px) and (max-width: 1024px) {
        .countdown-val {
          font-size: 4rem !important;
        }
      }

      @media (min-width: 1025px) {
        .countdown-val {
          font-size: 6rem !important;
        }
      }

      /* Fix for footer jumping */
      #root > div > section:last-of-type {
        margin-bottom: 0 !important;
        padding-bottom: 5rem !important;
      }

      /* Fix for squashed images and layout issues */
      img {
        max-width: 100%;
        height: auto;
        object-fit: contain;
      }

      /* Ensure images intended to cover sections do so correctly */
      [class*="h-screen"] img, 
      [class*="h-["] img,
      [class*="min-h-screen"] img {
        object-fit: cover;
      }

      /* Fix for layout gaps without forcing flex on root */
      #root {
        width: 100%;
        position: relative;
      }

      section, [class*="min-h-screen"] {
        width: 100%;
        position: relative;
        box-sizing: border-box;
      }
    </style>
    <script>
      // More aggressive approach for '00:00 FINISH'
      const hideFinish = () => {
        try {
          document.querySelectorAll('.flex.items-center.group, .grid.grid-cols-2, .relative.flex.items-center, section div div').forEach(el => {
            const text = el.innerText.toUpperCase();
            if (text.includes('00:00') && (text.includes('FINISH') || text.includes('FINAL') || text.includes('TERMINAR'))) {
                // Find the container (usually a group or a grid row)
                let container = el;
                if (el.classList.contains('group') || el.classList.contains('grid')) {
                  container = el;
                } else {
                  container = el.closest('.group') || el.closest('.grid') || el.closest('div[class*="items-center"]');
                }
                
                if (container) {
                  container.style.setProperty('display', 'none', 'important');
                  container.style.setProperty('visibility', 'hidden', 'important');
                }
            }
          });
        } catch (e) {}
      };

      // Force hide any persistent elements that might be the question mark
      const hideElements = () => {
        const selectors = [
          '[class*="LanguageProvider"]',
          '[class*="language-switcher"]',
          '[class*="floating-widget"]',
          '.fixed.top-1\\/2.right-4',
          '.absolute.top-1\\/2.right-4',
          '[style*="z-index: 9999"]',
          '[style*="z-index: 2147483647"]',
          'iframe[src*="google.com"]',
          '[src*="champagne"]',
          '.tp-caption',
          '.tp-caption img',
          'img[src*="venue-hedsor-front"]',
          'img[src*="bow-illustration"]',
          '[class*="rev_slider"]',
          '[class*="tp-banner"]',
          '[class*="tp-bgimg"]',
          '[class*="tp-loader"]',
          '.tp-caption',
          '#rev_slider'
        ];
        selectors.forEach(s => {
          try {
            document.querySelectorAll(s).forEach(el => {
              el.style.setProperty('display', 'none', 'important');
              el.style.setProperty('visibility', 'hidden', 'important');
              el.style.setProperty('width', '0', 'important');
              el.style.setProperty('height', '0', 'important');
            });
          } catch (e) {}
        });

        hideFinish();

        // Aggressively scan and hide broken images (iOS fix)
        try {
          document.querySelectorAll('img').forEach(img => {
            if (!img.src || img.src.includes('undefined') || img.src.includes('null') || img.src === window.location.href) {
               img.style.setProperty('display', 'none', 'important');
            }
            img.onerror = () => {
               img.style.setProperty('display', 'none', 'important');
            };
          });
        } catch (e) {}

        // Specifically target and hide the mansion/bow sections more aggressively
        // These sections often have large padding that leaves a gap
        document.querySelectorAll('section').forEach(section => {
          const innerHTML = section.innerHTML;
          if (innerHTML.includes('venue-hedsor-front') || innerHTML.includes('bow-illustration')) {
            section.style.setProperty('display', 'none', 'important');
            section.style.setProperty('height', '0', 'important');
            section.style.setProperty('padding', '0', 'important');
            section.style.setProperty('margin', '0', 'important');
          }
          // Also hide any dividers/spacers that might be empty
          if (section.children.length === 1 && section.querySelector('.h-\\[1px\\]')) {
             // This might be a separator section
             section.style.setProperty('display', 'none', 'important');
          }
        });

        // Hide any empty div with a horizontal line between Countdown and Program
        // This is a common pattern in the compiled code
        const allDivs = document.querySelectorAll('div');
        allDivs.forEach(div => {
           if (div.classList.contains('h-[1px]') || (div.style.height === '1px' && div.style.width !== '100%')) {
              // Check if it's a standalone divider causing a gap
              const parent = div.parentElement;
              if (parent && parent.innerText.trim() === '' && parent.tagName === 'SECTION') {
                 // RESTORE: Check if this section contains decorative elements
                 const hasDecoration = parent.querySelector('img[src*="floral-vase"], img[src*="cupid"], img[src*="locket"], img[src*="matchbox"], img[src*="swans"], img[src*="wedding-rings"]');
                 if (!hasDecoration) {
                    parent.style.setProperty('display', 'none', 'important');
                 }
              }
           }
        });

        // Fix the large gap between Countdown and Day Programme
        const countdownHeader = Array.from(document.querySelectorAll('h2')).find(h => h.innerText.toLowerCase().includes('count') || h.innerText.toLowerCase().includes('cuenta'));
        const programHeader = Array.from(document.querySelectorAll('h2')).find(h => h.innerText.toLowerCase().includes('program') || h.innerText.toLowerCase().includes('día'));
        const preWeddingHeader = Array.from(document.querySelectorAll('h2, h3, p')).find(h => h.innerText.toLowerCase().includes('pre-wedding') || h.innerText.toLowerCase().includes('say hello') || h.innerText.toLowerCase().includes('saludar'));
        
        if (countdownHeader && programHeader) {
           const countdownSection = countdownHeader.closest('section');
           const programSection = programHeader.closest('section');
           if (countdownSection && programSection) {
              countdownSection.style.setProperty('padding-bottom', '80px', 'important');
              programSection.style.setProperty('padding-top', '80px', 'important');
              
              // Find any elements between them and hide them (but NOT decorations)
              let next = countdownSection.nextElementSibling;
              while (next && next !== programSection) {
                 const hasDecoration = next.querySelector('img[src*="floral-vase"], img[src*="cupid"], img[src*="locket"], img[src*="matchbox"], img[src*="swans"], img[src*="wedding-rings"]');
                 if (!hasDecoration) {
                    next.style.setProperty('display', 'none', 'important');
                 }
                 next = next.nextElementSibling;
              }
           }
        }

        if (programHeader && preWeddingHeader) {
           const programSection = programHeader.closest('section');
           const preWeddingSection = preWeddingHeader.closest('section');
           if (programSection && preWeddingSection) {
              programSection.style.setProperty('padding-bottom', '60px', 'important');
              preWeddingSection.style.setProperty('padding-top', '60px', 'important');
              preWeddingSection.style.setProperty('margin-top', '40px', 'important');
              
              // Find any elements between them and hide them (but NOT decorations)
              let next = programSection.nextElementSibling;
              while (next && next !== preWeddingSection) {
                 const hasDecoration = next.querySelector('img[src*="floral-vase"], img[src*="cupid"], img[src*="locket"], img[src*="matchbox"], img[src*="swans"], img[src*="wedding-rings"]');
                 if (!hasDecoration) {
                    next.style.setProperty('display', 'none', 'important');
                    next.style.setProperty('height', '0', 'important');
                    next.style.setProperty('padding', '0', 'important');
                 }
                 next = next.nextElementSibling;
              }
           }
        }
        
        // Hide Gift Section in Production
        const sections = document.querySelectorAll('section');
        sections.forEach(section => {
          const header = section.querySelector('h2');
          const text = header ? header.innerText.toLowerCase() : '';
          
          // DO NOT hide the welcome section
          if (text.includes('welcome') || text.includes('bienvenidos')) {
             section.style.setProperty('display', 'block', 'important');
             section.style.setProperty('visibility', 'visible', 'important');
             return;
          }

          // DO NOT hide the dress code section
          if (text.includes('dress') || text.includes('vestimenta') || text.includes('código')) {
             section.style.setProperty('display', 'block', 'important');
             section.style.setProperty('visibility', 'visible', 'important');
             return;
          }

          if (text.includes('gift') || text.includes('regalo')) {
             section.style.display = 'none';
          }
          // Also check for the venue section
          if (text.includes('venue') || text.includes('ubicación') || text.includes('donde')) {
             section.style.display = 'none';
          }
          // Also hide Dress Code section
          if (text.includes('dress') || text.includes('vestimenta') || text.includes('código')) {
             section.style.setProperty('display', 'none', 'important');
          }
          // Also check for mansion banner and bow
          const images = section.querySelectorAll('img');
          images.forEach(img => {
            if (img.src.includes('venue-hedsor-front') || img.src.includes('bow-illustration')) {
               section.style.display = 'none';
            }
          });
          // Also check for the gift icon SVG which might be easier to target
          const giftIcon = section.querySelector('.lucide-gift');
          if (giftIcon) {
            section.style.display = 'none';
          }
        });
      };

      // Patch countdown timer to show seconds
      const patchCountdown = () => {
        const sections = document.querySelectorAll('section');
        sections.forEach(section => {
          const header = section.querySelector('h2');
          if (header && (header.innerText.toLowerCase().includes('count') || header.innerText.toLowerCase().includes('cuenta'))) {
            // Find the container that holds the numbers
            const timeContainer = section.querySelector('.flex.items-center.justify-center') || 
                                  section.querySelector('div[class*="flex"][class*="items-center"][class*="justify-center"]');
            
            if (timeContainer) {
              // Target date: 12 September 2026
              const targetDate = new Date('2026-09-12T00:00:00').getTime();
              
              // We check if the container has our specific structure already
              if (timeContainer.querySelector('.countdown-wrapper')) {
                // Just update values if needed (though the interval handles it)
                return;
              }

              const isEs = document.documentElement.lang === 'es' || header.innerText.toLowerCase().includes('cuenta');
              
              const createUnit = (label) => `
                <div class="flex flex-col items-center countdown-unit">
                  <div class="font-display text-wedding-gold mb-2 countdown-val leading-none">00</div>
                  <div class="text-[9px] md:text-xs uppercase tracking-[0.2em] text-wedding-sage font-medium">${label}</div>
                </div>
              `;
              
              const sep = `<div class="text-wedding-gold text-2xl md:text-4xl self-start pt-1 mx-1 opacity-20 countdown-sep">|</div>`;
              
              timeContainer.style.setProperty('align-items', 'center', 'important');
              timeContainer.style.setProperty('display', 'flex', 'important');
              timeContainer.style.setProperty('justify-content', 'center', 'important');
              timeContainer.style.setProperty('width', '100%', 'important');
              timeContainer.style.setProperty('margin', '2rem 0', 'important');
              
              timeContainer.innerHTML = `
                <div class="countdown-wrapper" style="visibility: visible !important; opacity: 1 !important;">
                  ${createUnit(isEs ? 'Días' : 'Days')}
                  ${sep}
                  ${createUnit(isEs ? 'Horas' : 'Hours')}
                  ${sep}
                  ${createUnit(isEs ? 'Minutos' : 'Minutes')}
                  ${sep}
                  ${createUnit(isEs ? 'Segundos' : 'Seconds')}
                </div>
              `;

              const valElements = timeContainer.querySelectorAll('.countdown-val');
              
              const update = () => {
                const now = new Date().getTime();
                const diff = targetDate - now;
                if (diff <= 0) return;
                
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                // Always query elements again to ensure they are still in the DOM
                const currentVals = timeContainer.querySelectorAll('.countdown-val');
                if (currentVals[0]) currentVals[0].innerText = d.toString().padStart(2, '0');
                if (currentVals[1]) currentVals[1].innerText = h.toString().padStart(2, '0');
                if (currentVals[2]) currentVals[2].innerText = m.toString().padStart(2, '0');
                if (currentVals[3]) currentVals[3].innerText = s.toString().padStart(2, '0');
              };
              
              update();
              // Store interval ID to clear it if needed (optional but cleaner)
              if (window.countdownInterval) clearInterval(window.countdownInterval);
              window.countdownInterval = setInterval(update, 1000);
            }
          }
        });
      };

      document.addEventListener('DOMContentLoaded', () => {
        // Global error listener to catch broken images immediately
        window.addEventListener('error', (e) => {
          if (e.target && e.target.tagName === 'IMG') {
            e.target.style.setProperty('display', 'none', 'important');
          }
        }, true);

        try {
          hideElements();
        } catch (e) {
          console.error('Error hiding elements:', e);
        }

        // Fade in body - ensure this runs even if scripts above fail
        const showContent = () => {
           document.body.classList.add('loaded');
           document.body.style.opacity = '1';
        };
        setTimeout(showContent, 50);
        window.addEventListener('load', showContent);

        const video = document.getElementById('hero-video');
        
        // Optimize video placement
        const moveVideo = () => {
          // Look for the first section that is likely the hero
          const sections = document.querySelectorAll('#root section, #root [class*="min-h-screen"]');
          if (sections.length > 0) {
            const hero = sections[0];
            if (video && !hero.contains(video)) {
              hero.classList.add('hero-active');
              hero.style.position = 'relative';
              hero.insertBefore(video, hero.firstChild);
              video.style.display = 'block';
              setTimeout(() => {
                video.classList.add('visible');
                video.play().catch(() => {});
              }, 100);
            }
          }
        };

        // MutationObserver for React mount
        const observer = new MutationObserver((mutations) => {
          hideElements();
          hideFinish();
          moveVideo();
          patchCountdown();
          
          // Additional iOS check for broken images
          document.querySelectorAll('img').forEach(img => {
            if (!img.src || img.src === window.location.href || img.src.includes('undefined') || img.src.includes('null')) {
                img.style.setProperty('display', 'none', 'important');
            }
            if (img.complete && img.naturalWidth === 0) {
                img.style.setProperty('display', 'none', 'important');
            }
            img.onerror = () => {
                img.style.setProperty('display', 'none', 'important');
            };
          });

          // Also check for background-images that might be failing
          document.querySelectorAll('*').forEach(el => {
             const bg = window.getComputedStyle(el).backgroundImage;
             if (bg && (bg.includes('undefined') || bg.includes('null'))) {
                el.style.setProperty('background-image', 'none', 'important');
             }
          });
          
          // Add reveal classes to sections (skipping hero)
          const sections = document.querySelectorAll('#root section, #root > div > div:not([class*="fixed"])');
          sections.forEach((section, index) => {
            if (index === 0) return; // Skip hero
            if (!section.classList.contains('reveal-on-scroll') && !section.contains(video)) {
              // Ensure children are properly sized
              section.style.width = '100%';
              section.classList.add('reveal-on-scroll');
              revealObserver.observe(section);
            }
          });

          // Interchange misplaced Teacup and Sunday Lunch images
          document.querySelectorAll('img').forEach(img => {
            if (img.src.includes('teacup-illustration') && !img.dataset.swapped) {
               // This is currently in Farewell Brunch, move it to Welcome Drinks
               const parent = img.closest('div');
               const section = img.closest('section');
               if (section && section.innerText.toLowerCase().includes('welcome')) {
                  // Already correct or needs check
               }
            }
          });

          // More reliable swap by targeting the cards
          const eventCards = document.querySelectorAll('.bg-white.p-8.rounded-lg, .bg-white.p-10.rounded-xl, div[class*="bg-white"]');
          let welcomeCard, farewellCard;
          
          eventCards.forEach(card => {
             const text = card.innerText.toLowerCase();
             if (text.includes('welcome drinks') || text.includes('bienvenida')) welcomeCard = card;
             if (text.includes('farewell brunch') || text.includes('sunday lunch') || text.includes('despedida')) farewellCard = card;
          });

          if (welcomeCard && farewellCard) {
             const welcomeImg = welcomeCard.querySelector('img');
             const farewellImg = farewellCard.querySelector('img');
             
             if (welcomeImg && farewellImg && !welcomeImg.dataset.swapped) {
                const tempSrc = welcomeImg.src;
                welcomeImg.src = farewellImg.src;
                farewellImg.src = tempSrc;
                welcomeImg.dataset.swapped = 'true';
                farewellImg.dataset.swapped = 'true';
             }
          }
        });

        // IntersectionObserver for scroll animations
        const revealObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
              // Optional: unobserve after reveal to prevent jumpy reappearance
              // revealObserver.unobserve(entry.target); 
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        observer.observe(document.body, { childList: true, subtree: true });
        window.addEventListener('load', moveVideo);
        window.addEventListener('resize', () => {
          hideElements();
          patchCountdown();
        });
      });
    </script>
