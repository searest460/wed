<!doctype html>
<html lang="en" class="light" translate="no" style="color-scheme: light only">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/use.typekit.net/xoc5iak.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="/fonts.googleapis.com/css2.css" rel="stylesheet">
    
    <!-- Load User Configuration First -->
    <script src="/wedding-config.js"></script>

    <title>Wedding Andrea &amp; Pedro</title>
    <meta name="google" content="notranslate">
    <meta id="meta-description" name="description" content="This invitation is exclusively for you">
    
    <meta property="og:type" content="website" />
    <meta id="og-title" property="og:title" content="Wedding Andrea &amp; Pedro">
    <meta id="og-description" property="og:description" content="This invitation is exclusively for you">
    <meta property="og:image" content="/assets/intro-poster-new-BU7qGwfU.jpg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta id="twitter-title" name="twitter:title" content="Wedding Andrea &amp; Pedro">
    <meta id="twitter-description" name="twitter:description" content="This invitation is exclusively for you">
    <meta name="twitter:image" content="/assets/intro-poster-new-BU7qGwfU.jpg">
  
    <style>
      /* --- GLOBAL STYLES & OPTIMIZATIONS --- */
      :root {
        --ivory-primary: #fdfbf7;
        --gold-primary: #d4af37;
        --text-main: #333333;
        --text-secondary: #666666;
      }

      html, body {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--ivory-primary);
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
        color: var(--text-main);
        font-family: serif; /* Better fallback for wedding theme */
      }

      body {
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      body.loaded {
        opacity: 1;
      }

      /* --- CLEANUP --- */
      [class*="LanguageProvider"],
      [class*="language-switcher"],
      .fixed.top-4.right-4, 
      .absolute.top-4.right-4,
      div[class*="blur-"][class*="xl"] {
        display: none !important;
      }

      /* --- HERO VIDEO --- */
      #hero-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        object-fit: cover;
        filter: brightness(0.75) saturate(1.1); /* Slightly darker for better text contrast */
        pointer-events: none;
      }

      .hero-active {
        background-color: transparent !important;
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex !important;
        align-items: center;
        justify-content: center;
      }

      /* --- LAYOUT & SPACING --- */
      #root, #root > div {
        display: flex !important;
        flex-direction: column !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      section, [class*="min-h-screen"] {
        width: 100% !important;
        margin: 0 !important;
        padding: 80px 0 !important; /* Consistent section padding */
        position: relative !important;
        box-sizing: border-box;
      }

      /* Reset padding for full-height sections */
      [class*="h-screen"], [class*="min-h-screen"]:first-of-type {
        padding: 0 !important;
      }

      /* --- IMAGE OPTIMIZATION --- */
      img {
        display: block !important;
        max-width: 100% !important;
        height: auto;
        margin: 0 auto;
        transition: transform 0.5s ease;
      }

      [class*="h-screen"] img, 
      [class*="h-["] img, 
      [class*="min-h-screen"] img,
      [class*="object-cover"] {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }

      /* --- VISUAL POLISH --- */
      h1, h2, h3, .font-serif {
        letter-spacing: 0.05em;
        line-height: 1.4;
      }

      [class*="bg-ivory"], [class*="bg-background"] {
        background-color: var(--ivory-primary) !important;
      }

      /* Interactive feel */
      a, button {
        transition: all 0.3s ease;
      }

      /* Better typography for timeline and info */
      p {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.8;
      }
    </style>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const config = window.WEDDING_CONFIG || {};

        // 1. Update Head & Meta Details
        const updateHead = () => {
          if (config.brideName && config.groomName) {
            const title = `Wedding ${config.brideName} & ${config.groomName}`;
            document.title = title;
            const ogTitle = document.getElementById('og-title');
            const twTitle = document.getElementById('twitter-title');
            if (ogTitle) ogTitle.setAttribute('content', title);
            if (twTitle) twTitle.setAttribute('content', title);
          }
          if (config.invitationText) {
            const mDesc = document.getElementById('meta-description');
            const ogDesc = document.getElementById('og-description');
            const twDesc = document.getElementById('twitter-description');
            if (mDesc) mDesc.setAttribute('content', config.invitationText);
            if (ogDesc) ogDesc.setAttribute('content', config.invitationText);
            if (twDesc) twDesc.setAttribute('content', config.invitationText);
          }
        };
        updateHead();

        // 2. Advanced Dynamic Text Injection
        const injectDynamicText = () => {
          const walk = (node) => {
            if (node.nodeType === 3) { // Text node
              let text = node.nodeValue;
              let changed = false;

              // Priority 1: Exact Hero Title Match
              if (config.heroTitle && text.trim() === "Andrea & Pedro") {
                text = config.heroTitle;
                changed = true;
              } else {
                // Priority 2: Pattern Replacements
                if (config.brideName && text.includes('Andrea')) {
                  text = text.replace(/Andrea/g, config.brideName);
                  changed = true;
                }
                if (config.groomName && text.includes('Pedro')) {
                  text = text.replace(/Pedro/g, config.groomName);
                  changed = true;
                }
                if (config.weddingDate && text.includes('12 September 2026')) {
                  text = text.replace(/12 September 2026/g, config.weddingDate);
                  changed = true;
                }
                if (config.venueName && text.includes('Hedsor House')) {
                  text = text.replace(/Hedsor House/g, config.venueName);
                  changed = true;
                }
                if (config.heroSubtitle && text.trim() === "WE'RE GETTING MARRIED") {
                  text = config.heroSubtitle;
                  changed = true;
                }
              }

              if (changed) {
                node.nodeValue = text;
              }
            } else if (node.nodeType === 1 && node.childNodes) {
              if (node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
                for (let i = 0; i < node.childNodes.length; i++) {
                  walk(node.childNodes[i]);
                }
              }
            }
          };

          const root = document.getElementById('root');
          if (root) walk(root);
        };

        // 3. Move Hero Video & Section Detection
        const moveVideo = () => {
          const video = document.getElementById('hero-video');
          const sections = document.querySelectorAll('#root section, #root [class*="min-h-screen"]');
          if (sections.length > 0) {
            const hero = sections[0];
            if (video && !hero.contains(video)) {
              hero.classList.add('hero-active');
              hero.insertBefore(video, hero.firstChild);
              video.style.display = 'block';
              video.play().catch(() => {});
            }
            injectDynamicText();
          }
        };

        document.body.classList.add('loaded');
        const observer = new MutationObserver(moveVideo);
        observer.observe(document.body, { 
          childList: true, 
          subtree: true,
          characterData: true 
        });
        
        window.addEventListener('load', moveVideo);
        setTimeout(moveVideo, 800);
      });
    </script>
    <script type="module" crossorigin src="/assets/index-CvER8GyV.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-swSRspiq.css">
  </head>

  <body>
    <video autoplay muted loop playsinline id="hero-video" style="display: none;">
      <source src="/assets/hero-video-BkP1eoiB.mp4" type="video/mp4">
    </video>
    <div id="root"></div>
  </body>
</html>
